    // ÁLLAPOT (State)
    const state = {

    // AKCIÓK
    window.addPlayer = function(e) {
      if (e) e.preventDefault();
      const input = document.getElementById('playerNameInput');
      const name = input.value.trim();
      if (name && state.players.length < 10 && !state.players.includes(name)) {
        state.players.push(name);
        input.value = '';
        render();
      }
    };

    window.removePlayer = function(index) {
      state.players.splice(index, 1);
      if (state.players.length < 5 && state.impostorCount === 2) {
        state.impostorCount = 1;
      }
      render();
    };

    window.setImpostorCount = function(count) {
      if (count === 2 && state.players.length < 5) return;
      state.impostorCount = count;
      render();
    };

    window.startRound = function() {
      if (state.players.length < 3) return alert("Minimum 3 játékos kell!");
      if (state.impostorCount >= state.players.length) return alert("Túl sok az imposztor!");

      const randomItem = historyTopics[Math.floor(Math.random() * historyTopics.length)];
      state.currentTopic = randomItem.topic;

      const shuffled = [...state.players].sort(() => 0.5 - Math.random());
      state.currentImpostors = shuffled.slice(0, state.impostorCount);

      state.currentPlayerIndex = 0;
      triggerViewTransition('PASS');
    };

    window.goToReveal = function() {
      triggerViewTransition('REVEAL');
    };

    window.handleRevealDone = function() {
      if (state.currentPlayerIndex + 1 < state.players.length) {
        state.currentPlayerIndex++;
        triggerViewTransition('PASS');
      } else {
        triggerViewTransition('DISCUSSION');
      }
    };

    window.finishRound = function() {
      state.history.unshift({
        topic: state.currentTopic,
        impostors: [...state.currentImpostors]
      });
      triggerViewTransition('HISTORY');
    };

    window.setView = function(newView) {
      triggerViewTransition(newView);
    };

    function triggerViewTransition(newView) {
      const app = document.getElementById('app');
      app.classList.remove('view-transition');
      void app.offsetWidth; 
      state.view = newView;
      app.classList.add('view-transition');
      render();
    }

                  <button 
                    onclick="window.setImpostorCount(1)"
                    class="flex-1 py-3 rounded-2xl font-extrabold text-sm tracking-wide transition-all border ${state.impostorCount === 1 ? 'bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 border-transparent shadow-lg shadow-yellow-500/10' : 'bg-slate-800/40 text-slate-400 border-slate-700/50 hover:bg-slate-800'}"
                  >
                    1 Imposztor
                  </button>
                  <button 
                    onclick="window.setImpostorCount(2)"
                    ${state.players.length < 5 ? 'disabled' : ''}
                    class="flex-1 py-3 rounded-2xl font-extrabold text-sm tracking-wide transition-all border ${state.impostorCount === 2 ? 'bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 border-transparent shadow-lg shadow-yellow-500/10' : 'bg-slate-800/40 text-slate-400 border-slate-700/50 hover:bg-slate-800'} disabled:opacity-20 disabled:cursor-not-allowed"
                  >
                    2 Imposztor
                  </button>
                </div>
                ${impostorWarning}
              </div>

              <button 
                onclick="window.startRound()"
                ${state.players.length < 3 ? 'disabled' : ''}
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:brightness-110 text-white text-lg font-black py-4 rounded-2xl shadow-xl shadow-emerald-950/20 transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed disabled:active:scale-100"
              >
                Kör Indítása ⚔️
              </button>
              
              ${historyButton}
            </div>
          </div>
        `;
      }

      else if (state.view === 'PASS') {
        app.innerHTML = `
          <div class="text-center py-10 bg-slate-900/40 border border-slate-800/60 p-8 rounded-3xl backdrop-blur-md shadow-2xl">
            <span class="inline-block px-3 py-1 bg-slate-800 rounded-full text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Pass-and-Play</span>
            <h2 class="text-lg text-slate-400 font-medium mb-1">Add át a készüléket:</h2>
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-400 mb-14 tracking-tight break-words px-2">${state.players[state.currentPlayerIndex]}</h1>
            
            <button 
              onclick="window.goToReveal()"
              class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:brightness-110 text-white text-lg font-extrabold py-4.5 px-8 rounded-2xl shadow-xl shadow-blue-950/50 active:scale-95 transition-all w-full max-w-xs mx-auto block"
            >
              Kattints a megtekintéshez
            </button>
          </div>
        `;
      }

      else if (state.view === 'REVEAL') {
        const isImpostor = state.currentImpostors.includes(state.players[state.currentPlayerIndex]);
        
        if (isImpostor) {
          app.innerHTML = `
            <div class="fixed inset-0 bg-gradient-to-b from-rose-950 via-rose-900 to-black flex flex-col items-center justify-between p-6 text-center">
              <div class="my-auto max-w-xs">
                <span class="text-xs font-black tracking-widest text-rose-400 bg-rose-950/80 border border-rose-800 px-4 py-1.5 rounded-full uppercase mb-4 inline-block">Szigorúan Titkos</span>
                <h1 class="text-6xl font-black text-white mb-6 tracking-normal drop-shadow-lg">IMPOSZTOR</h1>
                <p class="text-base text-rose-200/90 leading-relaxed font-medium">Nincs titkos tételed. Figyelj a többiek homályos utalásaira, és próbálj meg észrevétlenül beolvadni!</p>
              </div>
              <button 
                onclick="window.handleRevealDone()"
                class="w-full max-w-xs bg-white text-rose-950 text-lg font-black py-4 rounded-2xl shadow-2xl hover:bg-rose-50 active:scale-95 transition-all mb-4"
              >
                Képernyő lezárása
              </button>
            </div>
          `;
        } else {
          app.innerHTML = `
            <div class="fixed inset-0 bg-gradient-to-b from-emerald-950 via-emerald-900 to-black flex flex-col items-center justify-between p-6 text-center">
              <div class="my-auto w-full max-w-sm px-4">
                <span class="text-xs font-black tracking-widest text-emerald-400 bg-emerald-950/80 border border-emerald-800 px-4 py-1.5 rounded-full uppercase mb-5 inline-block">Békés Polgár</span>
                <p class="text-xs uppercase tracking-widest text-emerald-300/70 font-bold mb-3">A titkos történelem tétel:</p>
                
                <div class="bg-emerald-950/90 border-2 border-emerald-500/40 rounded-2xl p-6 shadow-2xl shadow-black/50 mb-5 backdrop-blur-sm">
                  <h2 class="text-3xl font-black text-white tracking-tight leading-snug">${state.currentTopic}</h2>
                </div>
                
                <p class="text-xs text-emerald-200/80 italic leading-relaxed max-w-xs mx-auto">Mondj egy okos kulcsszót vagy utalást, amiből a társaid tudják, hogy képben vagy, de az Imposztor ne jöjjön rá!</p>
              </div>
              <button 
                onclick="window.handleRevealDone()"
                class="w-full max-w-xs bg-white text-emerald-950 text-lg font-black py-4 rounded-2xl shadow-2xl hover:bg-emerald-50 active:scale-95 transition-all mb-4"
              >
                Képernyő lezárása
              </button>
            </div>
          `;
        }
      }

      else if (state.view === 'DISCUSSION') {
        app.innerHTML = `
          <div class="text-center py-8 bg-slate-900/60 border border-slate-800 p-6 rounded-3xl backdrop-blur-md shadow-2xl">
            <div class="w-16 h-16 bg-gradient-to-tr from-amber-400 to-yellow-500 text-slate-950 text-3xl flex items-center justify-center font-bold rounded-2xl mx-auto mb-6 shadow-xl shadow-yellow-500/10 animate-pulse">📢</div>
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-400 mb-4 tracking-tight">Kezdődik a vita!</h1>
            <p class="text-slate-300 text-sm leading-relaxed mb-8 px-2">
              Mindenki megnézte a lapját, tegyétek a telefont az asztal közepére. <br><br>
              Menjetek körbe: mindenki mondjon <b>egyetlen rövid nyomot</b>, majd indulhat a gyanúsítgatás és az élő szavazás!
            </p>
            
            <button 
              onclick="window.finishRound()"
              class="w-full max-w-xs bg-gradient-to-r from-emerald-500 to-teal-600 hover:brightness-110 text-white text-lg font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all block mx-auto"
            >
              Kör Vége (Megoldás)
            </button>
          </div>
        `;
      }

      else if (state.view === 'HISTORY') {
        let historyCardsHTML = state.history.map((round, idx) => `
          <div class="bg-slate-800/40 backdrop-blur-sm p-4 rounded-2xl border border-slate-700/40 shadow-sm text-left">
            <div class="flex justify-between items-center mb-1">
              <span class="text-[10px] font-black text-slate-500 tracking-wider uppercase">${state.history.length - idx}. FORDULÓ</span>
            </div>
            <div class="font-black text-lg text-white tracking-tight leading-tight mb-2.5">${round.topic}</div>
            <div class="text-xs text-rose-400 font-semibold flex items-center gap-1.5">
              <span class="text-slate-500 font-medium">Imposztor:</span> 
              <span class="bg-rose-950/40 px-2 py-0.5 rounded-lg border border-rose-900/50 text-rose-300 font-bold">${round.impostors.join(', ')}</span>
            </div>
          </div>
        `).join('');

        app.innerHTML = `
          <div class="w-full py-2">
            <div class="text-center mb-6">
              <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-500 tracking-tight uppercase">Múltbéli Körök</h1>
              <p class="text-slate-500 text-xs mt-0.5">A meccsek részletei (helyi session)</p>
            </div>
            
            <div class="space-y-3 max-h-[50vh] overflow-y-auto p-0.5 mb-8">
              ${historyCardsHTML}
            </div>

            <div class="flex gap-3">
              <button 
                onclick="window.startRound()"
                class="flex-1 bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-black py-4 rounded-2xl shadow-lg shadow-yellow-500/5 transition-all active:scale-95 hover:brightness-110"
              >
                Új kör indítása
              </button>
              <button 
                onclick="window.setView('LOBBY')"
                class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-4 rounded-2xl shadow-md transition-all active:scale-95 border border-slate-700/50"
              >
                Főmenü
              </button>
            </div>
          </div>
        `;
      }
    }

    // Első renderelés indítása
    render();
  </script>
</body>
</html>
